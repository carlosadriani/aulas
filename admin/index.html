<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Administração — Ajuda Professor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9; color: #0f172a; margin: 0; }
        header { background: #003366; color: #fff; padding: 16px 24px; display: flex;
            align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        header h1 { font-size: 1.15rem; margin: 0; }
        header .who { font-size: .85rem; color: #cbd5e1; }
        header a { color: #fdba74; font-size: .85rem; }
        main { max-width: 980px; margin: 0 auto; padding: 24px 16px 64px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
        .tabs button { cursor: pointer; border: 1px solid #cbd5e1; background: #fff; color: #334155;
            border-radius: 999px; padding: 8px 18px; font-weight: 600; font-family: inherit; font-size: .92rem; }
        .tabs button.active { background: #003366; color: #fff; border-color: #003366; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 18px 20px;
            margin-bottom: 16px; box-shadow: 0 2px 8px rgba(15,23,42,.04); }
        .card h3 { margin: 0 0 4px; font-size: 1.05rem; color: #1e3a8a; }
        .muted { color: #64748b; font-size: .85rem; }
        .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
        input[type=text], input[type=email] { border: 1px solid #cbd5e1; border-radius: 8px;
            padding: 8px 12px; font-family: inherit; font-size: .92rem; min-width: 180px; flex: 1 1 180px; }
        label.check { display: inline-flex; align-items: center; gap: 6px; background: #f8fafc;
            border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 10px; font-size: .88rem; cursor: pointer; }
        .btn { cursor: pointer; border: 0; border-radius: 8px; padding: 8px 14px; font-weight: 600;
            font-family: inherit; font-size: .9rem; background: #003366; color: #fff; }
        .btn.gold { background: #f59e0b; color: #0f172a; }
        .btn.ghost { background: transparent; color: #b91c1c; border: 1px solid #fecaca; padding: 4px 10px; }
        .btn.small { padding: 5px 10px; font-size: .82rem; }
        .btn:hover { opacity: .92; }
        ul.list { list-style: none; padding: 0; margin: 10px 0 0; }
        ul.list li { display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: .92rem; }
        .pill { display: inline-block; font-size: .72rem; font-weight: 700; border-radius: 999px;
            padding: 2px 9px; }
        .pill.pub { background: #dcfce7; color: #166534; }
        .pill.priv { background: #fee2e2; color: #991b1b; }
        .empty { color: #94a3b8; font-size: .88rem; padding: 8px 0; }
        #gate { max-width: 460px; margin: 80px auto; background: #fff; border-radius: 16px;
            padding: 40px; text-align: center; box-shadow: 0 10px 30px rgba(15,23,42,.08); }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #0f172a; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: .9rem;
            opacity: 0; transition: opacity .2s; pointer-events: none; }
        #toast.show { opacity: 1; }
        .sub { font-weight: 700; font-size: .82rem; color: #475569; margin: 14px 0 6px;
            text-transform: uppercase; letter-spacing: .03em; }
    </style>
</head>

<body>
    <div id="gate" style="display:none"></div>

    <div id="app" style="display:none">
        <header>
            <h1>Ajuda Professor · Administração</h1>
            <div>
                <span class="who" id="who"></span>
                &nbsp; <a href="/auth/logout">Sair</a>
            </div>
        </header>
        <main>
            <div class="tabs">
                <button data-tab="turmas" class="active">Turmas</button>
                <button data-tab="alunos">Alunos</button>
                <button data-tab="cursos">Cursos</button>
            </div>
            <section id="panel-turmas" class="panel active"></section>
            <section id="panel-alunos" class="panel"></section>
            <section id="panel-cursos" class="panel"></section>
        </main>
    </div>

    <div id="toast"></div>

    <script>
        let STATE = null;

        const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g,
            (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

        function toast(msg) {
            const t = document.getElementById("toast");
            t.textContent = msg; t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2200);
        }

        async function api(action, payload) {
            const res = await fetch("/api/admin/mutate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, payload }),
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || ("Erro " + res.status));
            return data;
        }

        async function refresh() {
            const res = await fetch("/api/admin/state");
            if (!res.ok) throw new Error("Falha ao carregar dados (" + res.status + ")");
            STATE = await res.json();
            renderTurmas(); renderAlunos(); renderCursos();
        }

        async function act(action, payload, okMsg) {
            try { await api(action, payload); await refresh(); if (okMsg) toast(okMsg); }
            catch (e) { alert("Erro: " + e.message); }
        }

        // ---------- Turmas ----------
        function renderTurmas() {
            const el = document.getElementById("panel-turmas");
            const turmas = STATE.turmas;
            let h = `<div class="card"><h3>Nova turma</h3>
                <div class="row">
                    <input type="text" id="nova-turma" placeholder="Ex.: ADS 2026/1 - Noturno">
                    <button class="btn" onclick="criarTurma()">Criar turma</button>
                </div></div>`;
            if (!turmas.length) h += `<div class="empty">Nenhuma turma cadastrada ainda.</div>`;
            for (const t of turmas) {
                const alunos = STATE.turmaAlunos[t.id] || [];
                h += `<div class="card">
                    <div class="row" style="justify-content:space-between">
                        <h3>${esc(t.nome)} <span class="muted">(${alunos.length} aluno(s))</span></h3>
                        <button class="btn ghost" onclick="delTurma(${t.id})">Excluir turma</button>
                    </div>
                    <div class="sub">Alunos da turma</div>
                    <ul class="list">${alunos.map((e) => `<li><span>${esc(e)}</span>
                        <button class="btn ghost small" onclick="rmAlunoTurma(${t.id}, '${esc(e)}')">remover</button></li>`).join("")
                    || `<li class="empty">Sem alunos.</li>`}</ul>
                    <div class="row">
                        <input type="email" id="add-turma-${t.id}" placeholder="email@aluno.com">
                        <input type="text" id="add-turma-nome-${t.id}" placeholder="Nome (opcional)">
                        <button class="btn gold" onclick="addAlunoTurma(${t.id})">Adicionar aluno</button>
                    </div></div>`;
            }
            el.innerHTML = h;
        }
        function criarTurma() {
            const i = document.getElementById("nova-turma");
            if (!i.value.trim()) return;
            act("createTurma", { nome: i.value.trim() }, "Turma criada");
        }
        function delTurma(id) { if (confirm("Excluir esta turma?")) act("deleteTurma", { id }, "Turma excluída"); }
        function addAlunoTurma(id) {
            const email = document.getElementById("add-turma-" + id).value.trim();
            const nome = document.getElementById("add-turma-nome-" + id).value.trim();
            if (!email) return;
            act("addAlunoToTurma", { turmaId: id, email, nome }, "Aluno adicionado");
        }
        function rmAlunoTurma(id, email) { act("removeAlunoFromTurma", { turmaId: id, email }, "Aluno removido"); }

        // ---------- Alunos ----------
        function renderAlunos() {
            const el = document.getElementById("panel-alunos");
            const alunos = STATE.alunos;
            let h = `<div class="card"><h3>Cadastrar aluno</h3>
                <p class="muted">Opcional — alunos também são criados ao adicioná-los a uma turma ou curso.</p>
                <div class="row">
                    <input type="email" id="novo-aluno" placeholder="email@aluno.com">
                    <input type="text" id="novo-aluno-nome" placeholder="Nome (opcional)">
                    <button class="btn" onclick="criarAluno()">Cadastrar</button>
                </div></div>
                <div class="card"><h3>Todos os alunos (${alunos.length})</h3>
                <ul class="list">${alunos.map((a) => `<li><span>${esc(a.email)}${a.nome ? " — " + esc(a.nome) : ""}</span>
                    <button class="btn ghost small" onclick="delAluno('${esc(a.email)}')">excluir</button></li>`).join("")
                || `<li class="empty">Nenhum aluno cadastrado.</li>`}</ul></div>`;
            el.innerHTML = h;
        }
        function criarAluno() {
            const email = document.getElementById("novo-aluno").value.trim();
            const nome = document.getElementById("novo-aluno-nome").value.trim();
            if (!email) return;
            act("upsertAluno", { email, nome }, "Aluno cadastrado");
        }
        function delAluno(email) { if (confirm("Excluir " + email + "? Remove de todas as turmas e cursos.")) act("deleteAluno", { email }, "Aluno excluído"); }

        // ---------- Cursos ----------
        function renderCursos() {
            const el = document.getElementById("panel-cursos");
            const cursos = STATE.cursos, turmas = STATE.turmas;
            let h = `<div class="card"><h3>Registrar curso</h3>
                <p class="muted">O "slug" é o nome da pasta do curso (ex.: <code>CloudComputing</code>).
                Marque "restrito" para exigir permissão.</p>
                <div class="row">
                    <input type="text" id="novo-curso-slug" placeholder="Pasta (slug), ex.: CloudComputing">
                    <input type="text" id="novo-curso-nome" placeholder="Nome do curso">
                    <label class="check"><input type="checkbox" id="novo-curso-restrito"> Restrito</label>
                    <button class="btn" onclick="criarCurso()">Registrar</button>
                </div></div>`;
            if (!cursos.length) h += `<div class="empty">Nenhum curso registrado.</div>`;
            for (const c of cursos) {
                const ct = STATE.cursoTurmas[c.id] || [];
                const ca = STATE.cursoAlunos[c.id] || [];
                const pill = c.publico ? `<span class="pill pub">Público</span>` : `<span class="pill priv">Restrito</span>`;
                h += `<div class="card">
                    <div class="row" style="justify-content:space-between">
                        <h3>${esc(c.nome)} ${pill} <span class="muted">/${esc(c.slug)}/</span></h3>
                        <span>
                            <button class="btn small" onclick="togglePublico(${c.id}, ${c.publico ? 1 : 0})">
                                ${c.publico ? "Tornar restrito" : "Tornar público"}</button>
                            <button class="btn ghost" onclick="delCurso(${c.id})">Excluir</button>
                        </span>
                    </div>`;
                if (!c.publico) {
                    h += `<div class="sub">Turmas com acesso</div><div class="row">${turmas.length
                        ? turmas.map((t) => `<label class="check"><input type="checkbox" ${ct.includes(t.id) ? "checked" : ""}
                            onchange="toggleTurmaCurso(${c.id}, ${t.id}, this.checked)"> ${esc(t.nome)}</label>`).join("")
                        : `<span class="empty">Crie turmas primeiro.</span>`}</div>
                        <div class="sub">Alunos com acesso individual</div>
                        <ul class="list">${ca.map((e) => `<li><span>${esc(e)}</span>
                            <button class="btn ghost small" onclick="rmAlunoCurso(${c.id}, '${esc(e)}')">remover</button></li>`).join("")
                        || `<li class="empty">Nenhum aluno individual.</li>`}</ul>
                        <div class="row">
                            <input type="email" id="add-curso-${c.id}" placeholder="email@aluno.com">
                            <button class="btn gold" onclick="addAlunoCurso(${c.id})">Liberar aluno</button>
                        </div>`;
                } else {
                    h += `<p class="muted">Curso público: todos têm acesso. Torne-o restrito para definir turmas e alunos.</p>`;
                }
                h += `</div>`;
            }
            el.innerHTML = h;
        }
        function criarCurso() {
            const slug = document.getElementById("novo-curso-slug").value.trim();
            const nome = document.getElementById("novo-curso-nome").value.trim();
            const restrito = document.getElementById("novo-curso-restrito").checked;
            if (!slug || !nome) return;
            act("createCurso", { slug, nome, publico: !restrito }, "Curso registrado");
        }
        function togglePublico(id, atual) { act("setCursoPublico", { id, publico: atual ? false : true }, "Curso atualizado"); }
        function delCurso(id) { if (confirm("Excluir este curso do controle de acesso? (não apaga os arquivos)")) act("deleteCurso", { id }, "Curso excluído"); }
        function toggleTurmaCurso(cursoId, turmaId, on) {
            act(on ? "addTurmaToCurso" : "removeTurmaFromCurso", { cursoId, turmaId }, "Acesso atualizado");
        }
        function addAlunoCurso(id) {
            const email = document.getElementById("add-curso-" + id).value.trim();
            if (!email) return;
            act("addAlunoToCurso", { cursoId: id, email }, "Aluno liberado");
        }
        function rmAlunoCurso(id, email) { act("removeAlunoFromCurso", { cursoId: id, email }, "Acesso removido"); }

        // ---------- Abas ----------
        document.querySelectorAll(".tabs button").forEach((b) => {
            b.addEventListener("click", () => {
                document.querySelectorAll(".tabs button").forEach((x) => x.classList.remove("active"));
                document.querySelectorAll(".panel").forEach((x) => x.classList.remove("active"));
                b.classList.add("active");
                document.getElementById("panel-" + b.dataset.tab).classList.add("active");
            });
        });

        // ---------- Início: verifica sessão/admin ----------
        (async function init() {
            const gate = document.getElementById("gate");
            let me;
            try { me = await (await fetch("/api/me")).json(); } catch (_) { me = { authenticated: false }; }
            if (!me.authenticated) {
                gate.style.display = "block";
                gate.innerHTML = `<h1 style="color:#003366">Administração</h1>
                    <p style="color:#475569">Você precisa entrar com sua conta Google de administrador.</p>
                    <a class="btn" style="text-decoration:none" href="/auth/login?next=%2Fadmin%2F">Entrar com o Google</a>`;
                return;
            }
            if (!me.admin) {
                gate.style.display = "block";
                gate.innerHTML = `<h1 style="color:#b91c1c">Sem permissão</h1>
                    <p style="color:#475569">A conta <b>${esc(me.email)}</b> não é administradora.</p>
                    <p><a href="/auth/logout">Sair</a> · <a href="/">Início</a></p>`;
                return;
            }
            document.getElementById("who").textContent = me.email;
            document.getElementById("app").style.display = "block";
            try { await refresh(); } catch (e) { alert("Erro ao carregar: " + e.message); }
        })();
    </script>
</body>

</html>
