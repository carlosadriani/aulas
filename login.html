<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Entrar — Ajuda Professor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #003366, #0f172a); color: #0f172a;
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .card {
            background: #fff; border-radius: 18px; padding: 40px 32px; max-width: 400px; width: 100%;
            text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, .3);
        }
        .card img { width: 180px; max-width: 70%; margin-bottom: 8px; }
        h1 { font-size: 1.35rem; color: #003366; margin: 8px 0 6px; }
        p { color: #475569; line-height: 1.6; font-size: .96rem; margin: 0 0 24px; }
        .gbtn {
            display: inline-flex; align-items: center; gap: 12px; text-decoration: none;
            background: #fff; color: #1f2937; border: 1px solid #cbd5e1; border-radius: 10px;
            padding: 12px 20px; font-size: 1rem; font-weight: 600; transition: box-shadow .15s, border-color .15s;
        }
        .gbtn:hover { box-shadow: 0 4px 12px rgba(0, 0, 0, .1); border-color: #94a3b8; }
        .gbtn svg { width: 20px; height: 20px; }
        .foot { margin-top: 22px; font-size: .82rem; color: #94a3b8; }
        .foot a { color: #64748b; }
    </style>
</head>

<body>
    <div class="card">
        <img src="/imagens/AjudaProfessor.png" alt="Ajuda Professor">
        <h1>Entrar</h1>
        <p>Alguns cursos são exclusivos para turmas autorizadas. Entre com a sua conta Google
            para continuar.</p>
        <a class="gbtn" id="login-btn" href="/auth/login">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.1C12.4 13.1 17.7 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7C43.9 37.8 46.5 31.7 46.5 24.5z"/>
                <path fill="#FBBC05" d="M10.5 28.3c-.5-1.4-.7-2.9-.7-4.3s.3-3 .7-4.3l-7.9-6.1C1 16.9 0 20.3 0 24s1 7.1 2.6 10.4l7.9-6.1z"/>
                <path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.6l-7.3-5.7c-2 1.4-4.7 2.3-8.2 2.3-6.3 0-11.6-3.6-13.5-9.8l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/>
            </svg>
            Entrar com o Google
        </a>
        <div class="foot"><a href="/">Voltar ao início</a></div>
    </div>

    <script>
        // Preserva o destino (?next=) ao clicar em "Entrar com Google"
        (function () {
            var params = new URLSearchParams(location.search);
            var next = params.get("next") || "/";
            if (!next.startsWith("/")) next = "/";
            var btn = document.getElementById("login-btn");
            btn.href = "/auth/login?next=" + encodeURIComponent(next);
        })();
    </script>
</body>

</html>
